<!DOCTYPE html>
<html lang="en">
<head>

  <!-- This tells the browser what kind of document this is -->
  <meta charset="UTF-8"/>

  <!-- This makes the page responsive on mobile screens -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- This is the tab title shown in the browser -->
  <title>KotoMatch</title>

  <!-- This imports our two Google Fonts: Playfair Display for headings, Jost for body -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>

  <!-- This connects our external CSS file where all the styling will live -->
  <link rel="stylesheet" href="style.css"/>

</head>
<body>

  <!-- =============================================
       SCREEN 1 — MENU SCREEN
       This is the first thing the player sees.
       Contains theme selector, settings, and start button.
       ============================================= -->
  <div id="menu-screen" class="screen active">
    <!-- Menu content will be added in the next step -->
  </div>

  <!-- =============================================
       SCREEN 2 — NAME ENTRY SCREEN
       Only shown when 2 Players is selected.
       Asks both players to type their names.
       ============================================= -->
  <div id="name-screen" class="screen">
    <!-- Name entry content will be added later -->
  </div>

  <!-- =============================================
       SCREEN 3 — GAME SCREEN
       The actual game board lives here.
       Hidden until the player starts the game.
       ============================================= -->
  <div id="game-screen" class="screen">
    <!-- Game content will be added later -->
  </div>

  <!-- =============================================
       OVERLAYS
       These are the popup screens (preview, win, game over).
       They sit on top of everything using position: fixed.
       ============================================= -->

  <!-- Card preview overlay — shows before game starts -->
  <div class="overlay" id="preview-overlay"></div>

  <!-- Win overlay — shows when all pairs are matched -->
  <div class="overlay" id="win-overlay"></div>

  <!-- Game over overlay — shows when countdown hits zero -->
  <div class="overlay" id="gameover-overlay"></div>

  <!-- Confetti canvas — drawn on top of everything on win -->
  <canvas id="confetti-canvas"></canvas>

  <!-- =============================================
       This connects our external JavaScript file.
       It is placed at the BOTTOM of body on purpose —
       so the HTML elements load first before JS runs.
       ============================================= -->
  <script src="script.js"></script>

</body>
</html>
